# render.yaml, place this file at the REPOSITORY ROOT for Render auto-detection.
# Render docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: tender-automation-api
    runtime: docker
    # Path is relative to the repo root
    dockerfilePath: ./tender-automation/Dockerfile
    dockerContext: ./tender-automation
    plan: free          # upgrade to "starter" ($7/mo) to avoid cold starts
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      # Set these in the Render dashboard, do NOT commit real values here
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      # These are safe to commit
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: "none"
      - key: LOG_LEVEL
        value: "INFO"
      # Replace with your actual Cloudflare Pages URL after first deploy
      - key: CORS_ORIGINS
        value: "https://your-portfolio.pages.dev"
